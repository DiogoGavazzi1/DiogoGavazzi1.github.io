<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login | WineStore</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/cart.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/product.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top nav-premium">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="assets/img/LOGO LOJA.png" class="Logotipo" alt="">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>


<!-- LOGIN SECTION -->
<section class="login-section d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-lg-5 col-md-7">

                <div class="login-card">

                    <div class="text-center mb-4">
                        <div class="gold-text mb-2">Área Reservada</div>
                        <h2 class="fw-bold">Iniciar Sessão</h2>
                        <p class="text-light opacity-75">
                            Aceda à sua conta para acompanhar encomendas e favoritos.
                        </p>
                    </div>

                    <form>

                        <div class="mb-4">
                            <input type="email" class="form-control form-premium" placeholder="Email">
                        </div>

                        <div class="mb-4">
                            <input type="password" class="form-control form-premium" placeholder="Password">
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <div>
                                <input type="checkbox" id="remember">
                                <label for="remember" class="text-light opacity-75">Lembrar-me</label>
                            </div>
                            <a href="#" class="text-decoration-none text-light opacity-75">
                                Esqueceu-se da password?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-outline-gold w-100">
                            Entrar
                        </button>

                        <div class="text-center mt-4">
                            <p class="text-light opacity-75 mb-0">
                                Ainda não tem conta?
                                <a href="#" class="text-decoration-none" style="color: var(--gold2);">
                                    Criar Conta
                                </a>
                            </p>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>
</section>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
